name: Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native bindings for current platform
        run: npm rebuild

      - name: Typecheck backend
        run: npm run build -w story-spark-ai-backend

      - name: Typecheck frontend
        run: npm exec -w story-spark-ai-frontend -- tsc -b --noEmit
