<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Theme Switcher Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; }
.page { min-height: 100vh; padding: 32px; transition: background 0.3s, color 0.3s; position: relative; }
.navbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-radius: 8px; margin-bottom: 32px; }
.nav-links { display: flex; gap: 20px; font-size: 14px; }
.hero { text-align: center; padding: 40px 20px; }
.hero h1 { font-size: 36px; font-weight: 700; margin-bottom: 12px; }
.hero p { font-size: 15px; opacity: 0.7; margin-bottom: 24px; }
.btn { padding: 10px 24px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin: 0 6px; }
.cards { display: flex; gap: 16px; justify-content: center; margin-top: 32px; flex-wrap: wrap; }
.card { padding: 20px; border-radius: 10px; width: 160px; text-align: center; }
.card h3 { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.card p { font-size: 12px; opacity: 0.6; }
.switcher { position: fixed; right: 16px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 8px; }
.theme-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #444; font-size: 13px; font-weight: 700; cursor: pointer; transition: transform 0.2s; display: flex; align-items: center; justify-content: center; }
.theme-btn:hover { transform: scale(1.2); }
</style>
</head>
<body>
<div class="page" id="page">
  <div class="navbar" id="navbar">
    <strong style="font-size:16px;">StorySparkAI</strong>
    <div class="nav-links"><span>Home</span><span>Explore</span><span>Stories</span></div>
    <span style="font-size:14px;">Login</span>
  </div>
  <div class="hero">
    <h1>Ignite Your Imagination</h1>
    <p>Create, edit, and generate engaging story variations from a single prompt.</p>
    <button class="btn" id="btn1">Get Started</button>
    <button class="btn" id="btn2">Collab Mode</button>
  </div>
  <div class="cards">
    <div class="card" id="card1"><h3>Dark Fantasy</h3><p>Epic tales of magic</p></div>
    <div class="card" id="card2"><h3>Sci-Fi</h3><p>Future worlds await</p></div>
    <div class="card" id="card3"><h3>Romance</h3><p>Love stories bloom</p></div>
  </div>
  <div class="switcher" id="switcher"></div>
</div>
<script>
const themes = [
  { id:1, name:"Dark",   bg:"#0f0f1a", text:"#ffffff", accent:"#6c63ff", card:"#1a1a2e", nav:"#1a1a2e" },
  { id:2, name:"Light",  bg:"#f5f5f5", text:"#1a1a1a", accent:"#6c63ff", card:"#ffffff", nav:"#ffffff" },
  { id:3, name:"Sunset", bg:"#1a0a00", text:"#ffd4a3", accent:"#ff6b35", card:"#2d1200", nav:"#2d1200" },
  { id:4, name:"Forest", bg:"#0a1a0a", text:"#d4ffd4", accent:"#4caf50", card:"#122012", nav:"#122012" },
  { id:5, name:"Neon",   bg:"#050510", text:"#e0e0ff", accent:"#00ffcc", card:"#0a0a20", nav:"#0a0a20" },
];
let active = 0;
function applyTheme(i) {
  active = i;
  const t = themes[i];
  document.getElementById('page').style.background = t.bg;
  document.getElementById('page').style.color = t.text;
  document.getElementById('navbar').style.background = t.nav;
  document.getElementById('btn1').style.background = t.accent;
  document.getElementById('btn1').style.color = t.bg;
  document.getElementById('btn2').style.background = 'transparent';
  document.getElementById('btn2').style.border = '1px solid ' + t.accent;
  document.getElementById('btn2').style.color = t.text;
  ['card1','card2','card3'].forEach(id => {
    document.getElementById(id).style.background = t.card;
  });
  document.querySelectorAll('.theme-btn').forEach((btn, idx) => {
    btn.style.borderColor = idx === i ? t.accent : '#555';
    btn.style.borderWidth = idx === i ? '3px' : '2px';
  });
}
const switcher = document.getElementById('switcher');
themes.forEach((t, i) => {
  const btn = document.createElement('button');
  btn.className = 'theme-btn';
  btn.textContent = t.id;
  btn.style.background = t.bg;
  btn.style.color = t.text;
  btn.title = t.name;
  btn.onclick = () => applyTheme(i);
  switcher.appendChild(btn);
});
applyTheme(0);
</script>
</body>
</html>
